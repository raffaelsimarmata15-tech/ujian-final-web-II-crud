<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow container mx-auto px-4 py-8">
    <div class="max-w-3xl mx-auto">

        <h2 th:text="${product.name}" class="text-2xl md:text-3xl font-bold text-gray-900 mb-6">Nama Produk</h2>

        <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
            <div class="border-t border-gray-200">
                <dl class="divide-y divide-gray-200">
                    <div class="bg-gray-50 px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Nama Lengkap</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2 font-semibold" th:text="${product.name}">-</dd>
                    </div>
                    <div class="bg-white px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Kategori</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${product.category?.name}">-</dd>
                    </div>
                    <div class="bg-gray-50 px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Harga</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}">Rp 0</dd>
                    </div>
                    <div class="bg-white px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Jumlah Stok</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${product.stock}">0</dd>
                    </div>
                    <div class="bg-gray-50 px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Deskripsi</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${product.description}">-</dd>
                    </div>
                    <div class="bg-white px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Status</dt>
                        <dd class="mt-1 text-sm sm:mt-0 sm:col-span-2">
                            <span th:if="${product.active}" class="px-2.5 py-0.5 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Aktif</span>
                            <span th:unless="${product.active}" class="px-2.5 py-0.5 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">Tidak Aktif</span>
                        </dd>
                    </div>
                    <div class="bg-gray-50 px-6 py-4 sm:grid sm:grid-cols-3 sm:gap-4">
                        <dt class="text-sm font-medium text-gray-500">Tanggal Dibuat</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" th:text="${product.createdAt}">-</dd>
                    </div>
                </dl>
            </div>
        </div>

        <div class="flex items-center space-x-3 mt-6">
            <a th:href="@{/products/{id}/edit(id=${product.id})}" class="bg-yellow-500 hover:bg-yellow-600 text-white font-medium py-2 px-6 rounded shadow-sm transition">
                Edit Produk
            </a>
            <a th:href="@{/products}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-6 rounded transition">
                Kembali ke Daftar
            </a>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
