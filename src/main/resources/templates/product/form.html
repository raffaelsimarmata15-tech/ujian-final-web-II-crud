<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow container mx-auto px-4 py-8">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
            <div class="border-b border-gray-200 bg-gray-50 px-6 py-4">
                <h2 th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'" class="text-xl font-bold text-gray-800">Form Produk</h2>
            </div>

            <div class="p-6">
                <form th:action="@{/products/save}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-5">
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Nama Produk</label>
                        <input type="text" id="name" th:field="*{name}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                               placeholder="Masukkan nama produk" required>
                    </div>

                    <div class="mb-5">
                        <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                        <select id="category" th:field="*{category}" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition bg-white">
                            <option value="">-- Pilih Kategori --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Kategori</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                        <div>
                            <label for="priceDisplay" class="block text-sm font-medium text-gray-700 mb-1">Harga (Rp)</label>
                            <input type="hidden" th:field="*{price}" id="price">
                            <input type="text" id="priceDisplay"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                                   placeholder="0" required>
                        </div>

                        <div>
                            <label for="stock" class="block text-sm font-medium text-gray-700 mb-1">Stok</label>
                            <input type="number" id="stock" th:field="*{stock}" min="0"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                                   placeholder="0" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
                        <textarea id="description" th:field="*{description}" rows="4"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                                  placeholder="Masukkan deskripsi produk"></textarea>
                    </div>

                    <div class="mb-6">
                        <label for="createdAt" class="block text-sm font-medium text-gray-700 mb-1">Tanggal Dibuat</label>
                        <input type="date" id="createdAt" th:field="*{createdAt}" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>

                    <div class="mb-8 flex items-center">
                        <input type="checkbox" id="active" th:field="*{active}"
                               class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
                        <label class="ml-2 block text-sm font-medium text-gray-900 cursor-pointer" for="active">
                            Produk Aktif
                        </label>
                    </div>

                    <div class="flex items-center space-x-3 pt-4 border-t border-gray-200">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-md shadow-sm transition">
                            Simpan Produk
                        </button>
                        <a th:href="@{/products}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-6 rounded-md transition">
                            Batal
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const priceHidden = document.getElementById('price');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatThousand(value) {
        return Number(value).toLocaleString('id-ID');
    }

    if (priceHidden.value && priceHidden.value !== '0') {
        priceDisplay.value = formatThousand(priceHidden.value);
    }

    priceDisplay.addEventListener('input', function () {
        const oldValue = this.value;
        const cursorPos = this.selectionStart;
        const dotsBeforeCursor = oldValue.substring(0, cursorPos).split('.').length - 1;

        const raw = oldValue.replace(/\./g, '').replace(/\D/g, '');
        priceHidden.value = raw;
        const formatted = raw ? formatThousand(raw) : '';
        this.value = formatted;

        const digitPos = cursorPos - dotsBeforeCursor;
        const newDotsBeforeCursor = formatted.substring(0, digitPos + dotsBeforeCursor + 1).split('.').length - 1;
        this.setSelectionRange(digitPos + newDotsBeforeCursor, digitPos + newDotsBeforeCursor);
    });
</script>
</body>
</html>
