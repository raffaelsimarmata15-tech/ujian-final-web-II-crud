<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow container mx-auto px-4 py-8">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white shadow-md rounded-xl overflow-hidden border border-gray-200">
            <div class="border-b border-gray-200 bg-gray-50 px-8 py-5">
                <h2 class="text-2xl font-bold text-gray-800">Edit Profil</h2>
                <p class="text-gray-500 text-sm mt-1">Perbarui informasi pribadi dan detail kontak Anda.</p>
            </div>

            <div class="p-8">
                <form th:action="@{/profile/edit}" th:object="${user}" method="post" class="space-y-6">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" th:field="*{fullName}" placeholder="Cth: Budi Santoso"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Username (Tidak bisa diubah)</label>
                            <input type="text" th:value="*{username}" disabled
                                   class="w-full px-4 py-2 border border-gray-300 bg-gray-100 text-gray-500 rounded-md cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" th:field="*{email}" placeholder="budi@example.com"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label>
                            <input type="text" th:field="*{phoneNumber}" placeholder="0812xxxxxx"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">URL Foto Profil</label>
                        <input type="url" th:field="*{profileImageUrl}" placeholder="https://example.com/foto-budi.jpg"
                               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                        <p class="text-xs text-gray-500 mt-1">Masukkan link gambar/foto dari internet.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Lengkap</label>
                        <textarea th:field="*{address}" rows="2" placeholder="Masukkan alamat lengkap"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Bio / Tentang Saya</label>
                        <textarea th:field="*{bio}" rows="4" placeholder="Ceritakan sedikit tentang diri Anda..."
                                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"></textarea>
                    </div>

                    <div class="flex items-center space-x-4 pt-4 border-t border-gray-100">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-md shadow transition">
                            Simpan Perubahan
                        </button>
                        <a th:href="@{/profile}" class="text-gray-600 hover:text-gray-800 font-medium transition">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
