<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold text-gray-900">Profil Saya</h2>
            <a th:href="@{/profile/edit}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-md shadow-sm transition flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Edit Profil
            </a>
        </div>

        <div th:if="${successMessage}" class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded shadow-sm">
            <span th:text="${successMessage}"></span>
        </div>

        <div class="bg-white shadow-md rounded-xl overflow-hidden border border-gray-200">
            <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>

            <div class="px-8 pb-8">
                <div class="relative flex justify-between items-end -mt-12 mb-6">
                    <div class="flex items-end">
                        <div th:if="${user.profileImageUrl != null and !user.profileImageUrl.isEmpty()}"
                             class="h-28 w-28 rounded-full border-4 border-white bg-white shadow-lg overflow-hidden">
                            <img th:src="${user.profileImageUrl}" alt="Profile" class="w-full h-full object-cover">
                        </div>
                        <div th:unless="${user.profileImageUrl != null and !user.profileImageUrl.isEmpty()}"
                             class="h-28 w-28 rounded-full border-4 border-white bg-blue-100 flex items-center justify-center text-blue-600 text-4xl font-bold shadow-lg">
                            <span th:text="${#strings.substring(user.username,0,1).toUpperCase()}">U</span>
                        </div>

                        <div class="ml-6 mb-2">
                            <h3 class="text-2xl font-bold text-gray-900" th:text="${user.fullName != null and !user.fullName.isEmpty() ? user.fullName : user.username}">Nama Lengkap</h3>
                            <p class="text-gray-500 font-medium">@<span th:text="${user.username}">username</span></p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-8">
                    <div class="md:col-span-2 space-y-6">
                        <div>
                            <h4 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">Tentang Saya</h4>
                            <p class="text-gray-600 leading-relaxed" th:text="${user.bio != null and !user.bio.isEmpty() ? user.bio : 'Belum ada bio yang ditambahkan.'}">Bio...</p>
                        </div>

                        <div>
                            <h4 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">Informasi Kontak</h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <p class="text-sm text-gray-500 font-medium">Email</p>
                                    <p class="text-gray-900 font-medium" th:text="${user.email != null and !user.email.isEmpty() ? user.email : '-'}">-</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 font-medium">Nomor Telepon</p>
                                    <p class="text-gray-900 font-medium" th:text="${user.phoneNumber != null and !user.phoneNumber.isEmpty() ? user.phoneNumber : '-'}">-</p>
                                </div>
                                <div class="sm:col-span-2">
                                    <p class="text-sm text-gray-500 font-medium">Alamat</p>
                                    <p class="text-gray-900 font-medium" th:text="${user.address != null and !user.address.isEmpty() ? user.address : '-'}">-</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-100 h-fit">
                        <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Status Akun</h4>
                        <div class="space-y-4">
                            <div>
                                <p class="text-xs text-gray-500">Anggota sejak</p>
                                <p class="font-medium text-gray-900">
                                    <span th:if="${user.createdAt != null}" th:text="${#temporals.format(user.createdAt, 'dd MMMM yyyy')}"></span>
                                    <span th:if="${user.createdAt == null}">-</span>
                                </p>
                            </div>
                            <div class="pt-4 border-t border-gray-200">
                                <a th:href="@{/profile/change-password}" class="text-blue-600 hover:text-blue-800 text-sm font-bold flex items-center transition">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                                    Ganti Password
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
