<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Kelola Kategori</h2>
        <a th:href="@{/categories/new}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md">Tambah Kategori</a>
    </div>
    <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="py-3 px-6 text-left text-xs font-semibold uppercase">Nama Kategori</th>
                <th class="py-3 px-6 text-left text-xs font-semibold uppercase">Deskripsi</th>
                <th class="py-3 px-6 text-center text-xs font-semibold uppercase">Aksi</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:each="cat : ${categories}" class="hover:bg-gray-50">
                <td class="py-4 px-6 text-sm font-medium text-gray-900" th:text="${cat.name}"></td>
                <td class="py-4 px-6 text-sm text-gray-500" th:text="${cat.description}"></td>
                <td class="py-4 px-6 text-sm text-center space-x-2">
                    <a th:href="@{/categories/{id}/edit(id=${cat.id})}" class="text-yellow-600 hover:underline">Edit</a>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" class="inline" onsubmit="return confirm('Hapus kategori ini?');">
                        <button type="submit" class="text-red-600 hover:underline ml-2">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
