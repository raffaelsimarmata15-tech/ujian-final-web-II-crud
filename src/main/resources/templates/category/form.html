<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white shadow-md rounded-xl border p-8">
        <h2 class="text-2xl font-bold mb-6" th:text="${category.id == null ? 'Tambah Kategori' : 'Edit Kategori'}"></h2>
        <form th:action="@{/categories/save}" th:object="${category}" method="post" class="space-y-6">
            <input type="hidden" th:field="*{id}">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Kategori</label>
                <input type="text" th:field="*{name}" required class="w-full px-4 py-2 border rounded-md focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Deskripsi</label>
                <textarea th:field="*{description}" rows="4" class="w-full px-4 py-2 border rounded-md"></textarea>
            </div>
            <div class="flex items-center space-x-4 pt-4">
                <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-md">Simpan</button>
                <a th:href="@{/categories}" class="text-gray-600">Batal</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
