<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans antialiased">
<div class="container mx-auto px-4">
    <div class="flex justify-center mt-12 sm:mt-16 mb-12">

        <div class="w-full max-w-md">

            <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-100">
                <div class="p-6 sm:p-8">
                    <h3 class="text-2xl font-bold text-gray-800 text-center mb-6">Register</h3>

                    <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-md shadow-sm" role="alert">
                        <p class="font-semibold" th:text="${error}"></p>
                    </div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">

                        <div class="mb-4">
                            <label for="username" class="block text-gray-700 text-sm font-semibold mb-2">Username</label>
                            <input type="text" id="username" th:field="*{username}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors"
                                   placeholder="Masukkan username" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="fullName" class="block text-gray-700 text-sm font-semibold mb-2">Nama Lengkap (Opsional)</label>
                            <input type="text" id="fullName" th:field="*{fullName}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors"
                                   placeholder="Cth: Budi Santoso">
                        </div>

                        <div class="mb-4">
                            <label for="email" class="block text-gray-700 text-sm font-semibold mb-2">Email (Opsional)</label>
                            <input type="email" id="email" th:field="*{email}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors"
                                   placeholder="budi@example.com">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                            <input type="password" id="password" th:field="*{password}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors"
                                   placeholder="Masukkan password" required>
                        </div>

                        <div class="mb-6">
                            <label for="confirmPassword" class="block text-gray-700 text-sm font-semibold mb-2">Konfirmasi Password</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors"
                                   placeholder="Ulangi password" required>
                        </div>

                        <button type="submit"
                                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-all duration-200">
                            Daftar
                        </button>
                    </form>

                    <div class="text-center mt-6 text-sm text-gray-600">
                        <span>Sudah punya akun? </span>
                        <a th:href="@{/login}" class="text-green-600 hover:text-green-800 font-semibold hover:underline transition-colors">Login di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
