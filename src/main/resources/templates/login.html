<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans antialiased">
<div class="container mx-auto px-4">
    <div class="flex justify-center mt-16 sm:mt-24">

        <div class="w-full max-w-md">

            <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-100">
                <div class="p-6 sm:p-8">
                    <h3 class="text-2xl font-bold text-gray-800 text-center mb-6">Login</h3>

                    <div th:if="${param.error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-md shadow-sm" role="alert">
                        <p class="font-semibold">Username atau password salah!</p>
                    </div>

                    <div th:if="${param.logout}" class="bg-blue-50 border-l-4 border-blue-500 text-blue-700 p-4 mb-6 rounded-md shadow-sm" role="alert">
                        <p class="font-semibold">Berhasil logout.</p>
                    </div>

                    <div th:if="${success}" class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded-md shadow-sm" role="alert">
                        <p class="font-semibold" th:text="${success}"></p>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-5">
                            <label for="username" class="block text-gray-700 text-sm font-semibold mb-2">Username</label>
                            <input type="text" id="username" name="username"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
                                   placeholder="Masukkan username" required autofocus>
                        </div>

                        <div class="mb-6">
                            <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                            <input type="password" id="password" name="password"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors"
                                   placeholder="Masukkan password" required>
                        </div>

                        <button type="submit"
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200">
                            Login
                        </button>
                    </form>

                    <div class="text-center mt-6 text-sm text-gray-600">
                        <span>Belum punya akun? </span>
                        <a th:href="@{/register}" class="text-blue-600 hover:text-blue-800 font-semibold hover:underline transition-colors">Daftar di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
