<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow container mx-auto px-4 py-8">
  <div class="max-w-md mx-auto">
    <div class="bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
      <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
        <h2 class="text-xl font-bold text-gray-800">Ganti Password</h2>
      </div>

      <div class="p-6">
        <div th:if="${errorMessage}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded text-sm">
          <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/profile/change-password}" method="post" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password Lama</label>
            <input type="password" name="oldPassword" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
          </div>

          <div class="pt-2 border-t border-gray-100">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
            <input type="password" name="newPassword" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
            <input type="password" name="confirmPassword" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
          </div>

          <div class="flex items-center space-x-3 pt-4">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md shadow transition">
              Simpan Perubahan
            </button>
            <a th:href="@{/profile}" class="text-gray-600 hover:text-gray-800 text-sm font-medium transition">Batal</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
